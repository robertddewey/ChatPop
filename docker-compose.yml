services:
  # Redis: required at runtime by Django (cache + WebSocket channel layer).
  # No local Postgres — daily dev hits AWS RDS via Tailscale; tests run in CI
  # via GitHub Actions service containers.
  redis:
    image: redis:7-alpine
    container_name: chatpop_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
